  <line x1="350" y1="185" x2="850" y2="185" stroke="url(#glow)" stroke-width="2"/>

  <!-- Subtitle -->
  <text x="600" y="235" text-anchor="middle" font-size="28" fill="#00d9ff" font-family="Arial, sans-serif" font-weight="bold">Senior Web3 Developer</text>

  <!-- Services -->
  <text x="600" y="285" text-anchor="middle" font-size="18" fill="#888888" font-family="Arial, sans-serif">Smart Contract  •  DeFi Protocol  •  NFT Marketplace  •  GameFi Platform</text>

  <!-- Stats section -->
  <g font-family="Arial, sans-serif">
    <!-- Stat 1 -->
    <text x="250" y="365" text-anchor="middle" font-size="36" font-weight="bold" fill="#00ff88">5+</text>
    <text x="250" y="395" text-anchor="middle" font-size="14" fill="#888888">Năm kinh nghiệm</text>

    <!-- Stat 2 -->
    <text x="600" y="365" text-anchor="middle" font-size="36" font-weight="bold" fill="#00ff88">$100M+</text>
    <text x="600" y="395" text-anchor="middle" font-size="14" fill="#888888">TVL Deployed</text>

    <!-- Stat 3 -->
    <text x="950" y="365" text-anchor="middle" font-size="36" font-weight="bold" fill="#00ff88">50+</text>
    <text x="950" y="395" text-anchor="middle" font-size="14" fill="#888888">Projects hoàn thành</text>
  </g>

  <!-- Horizontal divider -->
