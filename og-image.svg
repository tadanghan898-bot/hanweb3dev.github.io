  <text x="600" y="600" text-anchor="middle" font-size="18" fill="#0a0a1a" font-family="Arial, sans-serif" font-weight="bold">
    📧 tadanghan9@gmail.com  |  💬 @tadanghan9  |  🌐 hanweb3.dev
  </text>

  <!-- Border glow -->
  <rect x="2" y="2" width="1196" height="626" fill="none" stroke="#00d9ff" stroke-width="3" rx="5"/>

  <!-- Corner accents -->
  <rect x="0" y="0" width="40" height="5" fill="#00d9ff"/>
  <rect x="0" y="0" width="5" height="40" fill="#00d9ff"/>
  <rect x="1160" y="0" width="40" height="5" fill="#00d9ff"/>
  <rect x="1195" y="0" width="5" height="40" fill="#00d9ff"/>
  <rect x="0" y="625" width="40" height="5" fill="#00d9ff"/>
  <rect x="0" y="590" width="5" height="40" fill="#00d9ff"/>
  <rect x="1160" y="625" width="40" height="5" fill="#00d9ff"/>
  <rect x="1195" y="590" width="5" height="40" fill="#00d9ff"/>
</svg>
