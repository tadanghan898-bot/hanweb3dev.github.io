  <!-- Decorative lines -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#00d9ff" stroke-width="2" opacity="0.3"/>
  <line x1="850" y1="200" x2="1150" y2="200" stroke="#00d9ff" stroke-width="2" opacity="0.3"/>

  <!-- Avatar circle -->
  <circle cx="200" cy="250" r="90" fill="#0a0a1a" stroke="#00d9ff" stroke-width="4" filter="url(#shadow)"/>
  <circle cx="200" cy="250" r="82" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <!-- Avatar icon -->
  <text x="200" y="255" text-anchor="middle" font-size="70" fill="#00d9ff" font-family="Arial, sans-serif">👨‍💻</text>

  <!-- Glow behind avatar -->
