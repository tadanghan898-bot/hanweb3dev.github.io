  <!-- Services icons row -->
  <g font-family="Arial, sans-serif" font-size="13" fill="#aaa">
    <text x="200" y="460" text-anchor="middle">📜 Smart Contract</text>
    <text x="470" y="460" text-anchor="middle">💱 DeFi Protocol</text>
    <text x="740" y="460" text-anchor="middle">🖼️ NFT Marketplace</text>
    <text x="1010" y="460" text-anchor="middle">🎮 GameFi Platform</text>
  </g>

  <!-- Pricing preview -->
  <g font-family="Arial, sans-serif">
    <rect x="100" y="475" width="200" height="50" rx="8" fill="#0d1117" stroke="#00d9ff" stroke-width="1" opacity="0.8"/>
    <text x="200" y="500" text-anchor="middle" font-size="12" fill="#888">Starting from</text>
    <text x="200" y="518" text-anchor="middle" font-size="18" font-weight="bold" fill="#00ff88">$5,000</text>

    <rect x="500" y="475" width="200" height="50" rx="8" fill="#0d1117" stroke="#00ff88" stroke-width="1" opacity="0.8"/>
    <text x="600" y="500" text-anchor="middle" font-size="12" fill="#888">Avg. Project</text>
    <text x="600" y="518" text-anchor="middle" font-size="18" font-weight="bold" fill="#00ff88">$15,000</text>

    <rect x="900" y="475" width="200" height="50" rx="8" fill="#0d1117" stroke="#ffd700" stroke-width="1" opacity="0.8"/>
    <text x="1000" y="500" text-anchor="middle" font-size="12" fill="#888">Enterprise</text>
    <text x="1000" y="518" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffd700">$50,000+</text>
  </g>

  <!-- Bottom contact bar -->
